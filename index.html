<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./rps.js" defer></script>
    <title>Rock Paper Scissors</title>
</head>

<body>

    <div class="head">ROCK PAPER SCISSORS</div>

    <div class="content">
        <h1>Choose Your Weapon</h1>
        <h2>First to score 5 points wins the game</h2>
    </div>

    <div class="round">

        <div class="player">
            <div id="playerHand">?</div>
            <div id="playerScore">Player :</div>
        </div>

        <div class="computer">
            <div id="computerHand">?</div>
            <div id="computerScore">Computer :</div>
        </div>

    </div>
    <div class="choice">
        <button class="choiceBox" id="rock">
            <h1>&#9994</h1>
            <p>Rock</p>
        </button>
        <button class="choiceBox" id="paper">
            <h1>&#9995</h1>
            <p>Paper</p>
        </button>
        <button class="choiceBox" id="scissors">
            <h1>&#9996</h1>
            <p>Scissors</p>
        </button>

    </div>

    <script>
        const playerHand = document.getElementById("playerHand");
        const computerHand = document.getElementById("computerHand");

        const choiceBox = document.querySelectorAll(".choiceBox");
        // change player's hand by button-choice
        choiceBox.forEach(function (item) {
            item.addEventListener('click',
                function (e) {
                    switch (e.currentTarget.id) {
                        case "rock":
                            playerHand.textContent = String.fromCharCode(9994);
                            break;
                        case "paper":
                            playerHand.textContent = String.fromCharCode(9995);
                            break;
                        case "scissors":
                            playerHand.textContent = String.fromCharCode(9996);
                            break;
                    }

                }
            )
        })


    </script>

</body>

</html>
