<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./rps.js" defer></script>
    <title>Rock Paper Scissors</title>
</head>

<body>

    <div class="head">ROCK PAPER SCISSORS</div>

    <div class="content">
        <h1 id="head">Choose Your Weapon</h1>
        <h2 id="subHead">First to score 5 points wins the game</h2>
    </div>

    <div class="round">
        <div class="player">
            <div id="playerHand">?</div>
            <div id="playerScore">Player : 0</div>
        </div>

        <div class="computer">
            <div id="computerHand">?</div>
            <div id="computerScore">Computer : 0</div>
        </div>
    </div>

    <div class="choice">
        <button class="choiceBox" id="Rock">
            <h1>&#9994</h1>
            <p>Rock</p>
        </button>
        <button class="choiceBox" id="Paper">
            <h1>&#9995</h1>
            <p>Paper</p>
        </button>
        <button class="choiceBox" id="Scissors">
            <h1>&#9996</h1>
            <p>Scissors</p>
        </button>
    </div>

    <!--alert box-->
    <div id="customAlert" class="alert-box">
        <div class="alert-content">
            <h1 id="result">result</h1>
            <p id="score">score</p>
            <button id="playAgain">Play Again</button>
        </div>
    </div>


</body>

</html>
