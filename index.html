<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Rock Paper Scissors</title>
</head>

<body>

    <div class="head">ROCK PAPER SCISSORS</div>

    <div class="content">
        <h1>Choose Your Weapon</h1>
        <h2>First to score 5 points wins the game</h2>
    </div>

    <div class="round">

        <div class="player">
            <div class="playerHand">?</div>
            <div class="playerScore">Player :</div>
        </div>

        <div class="computer">
            <div class="computerHand">?</div>
            <div class="computerScore">Computer :</div>
        </div>

    </div>
    <div class="choice">
        <div class="choiceBox">
            <h1>&#9994</h1>
            <p>Rock</p>
        </div>
        <div class="choiceBox">
            <h1>&#9995</h1>
            <p>Paper</p>
        </div>
        <div class="choiceBox">
            <h1>&#9996</h1>
            <p>Scissors</p>
        </div>
    </div>

</body>

</html>
